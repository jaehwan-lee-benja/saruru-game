<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#385088" />
  <title>사르르목장 · 젖소 똥피하기</title>
  <meta name="description" content="사르르목장 미니게임 — 우리 젖소가 소똥을 피하고 우유·아이스크림을 모아요!" />
  <link rel="icon" href="./assets/logo.png" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <img class="brand-logo" src="./assets/logo.png" alt="사르르목장" />
    </header>

    <main class="stage-wrap">
      <div class="hud">
        <div class="hud-item">
          <span class="hud-label">점수</span>
          <span id="score" class="hud-value">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">최고</span>
          <span id="best" class="hud-value">0</span>
        </div>
        <div class="hud-item lives">
          <span class="hud-label">목숨</span>
          <span id="lives" class="hud-value">♥♥♥</span>
        </div>
      </div>

      <div class="canvas-frame">
        <canvas id="game" width="360" height="540"></canvas>

        <!-- 시작 화면 -->
        <div id="overlay-start" class="overlay">
          <div class="card">
            <img class="card-logo" src="./assets/logo.png" alt="사르르목장" />
            <h1>젖소 똥피하기</h1>
            <p class="lead">우리 젖소가 <b>소똥 💩</b>을 피하고<br /><b>우유·아이스크림</b>을 모아요!</p>
            <button id="btn-start" class="btn btn-primary">게임 시작</button>
            <p class="hint">← → 방향키 또는 화면을 좌우로 터치·드래그</p>
          </div>
        </div>

        <!-- 게임오버 화면 -->
        <div id="overlay-over" class="overlay hidden">
          <div class="card">
            <div class="over-badge" id="over-badge">🐄</div>
            <h1 id="over-title">또 도전!</h1>
            <p class="score-line">점수 <b id="final-score">0</b></p>
            <p class="best-line" id="best-line"></p>
            <button id="btn-retry" class="btn btn-primary">다시 도전</button>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="btn-left" class="pad" aria-label="왼쪽">◀</button>
        <button id="btn-right" class="pad" aria-label="오른쪽">▶</button>
      </div>
    </main>

    <footer class="footer">
      <span>사르르목장 · Fresh Milk Ice Cream</span>
      <span class="dot">·</span>
      <span>랭킹은 곧 열려요 🏆</span>
    </footer>
  </div>

  <script src="./js/game.js"></script>
</body>
</html>

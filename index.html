<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#385088" />
  <title>사르르목장 · 젖소 똥피하기</title>
  <meta name="description" content="사르르목장 레트로 픽셀 미니게임 — 우리 젖소 마스코트가 소똥을 피하고 우유·아이스크림을 모아요!" />
  <link rel="icon" href="./assets/logo.png" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <img class="brand-logo" src="./assets/logo.png" alt="사르르목장" />
      <div class="topbar-btns">
        <span id="who" class="who" hidden></span>
        <button id="btn-login" class="icon-btn" aria-label="카카오 로그인" title="카카오 로그인">🔑</button>
        <button id="btn-pause" class="icon-btn" aria-label="일시정지" title="일시정지">⏸</button>
        <button id="btn-mute" class="icon-btn" aria-label="소리 켜기/끄기" title="소리">🔊</button>
      </div>
    </header>

    <main class="stage-wrap">
      <div class="hud">
        <div class="hud-item">
          <span class="hud-label">SCORE</span>
          <span id="score" class="hud-value">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">BEST</span>
          <span id="best" class="hud-value">0</span>
        </div>
        <div class="hud-item lives">
          <span class="hud-label">LIFE</span>
          <span id="lives" class="hud-value">♥♥♥</span>
        </div>
      </div>

      <div class="canvas-frame">
        <canvas id="game" width="224" height="336"></canvas>

        <!-- 시작 화면 -->
        <div id="overlay-start" class="overlay">
          <div class="card">
            <h1>젖소 똥피하기</h1>
            <p class="lead">우리 젖소가 <b>소똥</b>을 피하고<br /><b>우유·아이스크림</b>을 모아요!</p>
            <p class="pick-label">모자 고르기</p>
            <div id="hat-pick" class="hat-pick"></div>
            <button id="btn-start" class="btn btn-primary">▶ START</button>
            <p class="hint">화면을 좌우로 <b>터치·드래그</b><br />(PC는 ← → 방향키)</p>
          </div>
        </div>

        <!-- 게임오버 화면 -->
        <div id="overlay-over" class="overlay hidden">
          <div class="card">
            <div class="over-badge" id="over-badge">GAME<br>OVER</div>
            <p class="score-line">SCORE <b id="final-score">0</b></p>
            <p class="best-line" id="best-line"></p>
            <button id="btn-retry" class="btn btn-primary">↻ RETRY</button>
          </div>
        </div>

        <!-- 일시정지 화면 -->
        <div id="overlay-pause" class="overlay hidden">
          <div class="card">
            <h1>일시정지</h1>
            <p class="lead">점수는 그대로 있어요.<br />천천히 다녀오세요!</p>
            <button id="btn-resume" class="btn btn-primary">▶ 계속하기</button>
          </div>
        </div>
      </div>

      <!-- 컨트롤 패드 — 캐릭터 아래라 엄지가 화면을 가리지 않는다 -->
      <div id="pad" class="pad" role="slider" aria-label="좌우 이동 컨트롤">
        <i class="pad-glow" aria-hidden="true"></i>
        <span class="pad-hint">◀ 여기를 좌우로 드래그 ▶</span>
      </div>
    </main>

    <footer class="footer">
      <span>사르르목장 · FRESH MILK ICE CREAM</span>
      <button id="btn-bug" class="bug-btn" type="button">🐞 버그 신고</button>
    </footer>
  </div>

  <!-- 버그 신고 -->
  <div id="bug-modal" class="modal hidden">
    <div class="modal-card">
      <h2>🐞 버그 신고</h2>
      <p class="modal-lead">이상한 점을 알려주세요. 어떤 상황이었는지 적어주시면 큰 도움이 됩니다.</p>
      <textarea id="bug-text" rows="5" placeholder="예: 게임오버 후 다시 시작했더니 처음부터 너무 빨라요"></textarea>
      <details class="bug-info">
        <summary>함께 보내는 정보</summary>
        <pre id="bug-meta"></pre>
      </details>
      <div class="modal-btns">
        <button id="bug-cancel" class="btn btn-ghost" type="button">취소</button>
        <button id="bug-send" class="btn btn-primary" type="button">보내기</button>
      </div>
      <p id="bug-msg" class="bug-msg"></p>
    </div>
  </div>

  <!-- 계정 레이어 (M2) — supabase-js v2 CDN + 로그인 모듈 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="./js/m2-auth.js"></script>
  <script>
    // anon(publishable) 키는 브라우저 노출이 정상인 public-safe 값. service_role 아님.
    const SUPABASE_URL = "https://rstazttwlghsorpzsugy.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_uK9OlDkemSL4S6yXFhTqpA_RngpzhiR";
    window.SaruruAuth && SaruruAuth.init(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>
  <script src="./js/auth-ui.js"></script>

  <script src="./js/game.js"></script>
  <script src="./js/bug-report.js"></script>
</body>
</html>
